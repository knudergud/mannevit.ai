<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #0c0b09;
    color: #eae6de;
    font-family: 'Instrument Serif', Georgia, serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 2rem;
    text-align: center;
  }

  .runes {
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    letter-spacing: 0.6em;
    color: #c9a84c;
    opacity: 0.4;
    margin-bottom: 3rem;
    user-select: none;
  }

  .stanza {
    font-size: clamp(1.3rem, 3vw, 1.75rem);
    font-style: italic;
    font-weight: 400;
    line-height: 1.55;
    color: #eae6de;
    max-width: 32ch;
    margin-bottom: 1.5rem;
  }

  .original {
    font-size: clamp(0.85rem, 1.8vw, 1rem);
    font-style: italic;
    color: #8a8678;
    margin-bottom: 1rem;
    max-width: 42ch;
  }

  .attribution {
    font-size: clamp(0.7rem, 1.5vw, 0.8rem);
    font-style: normal;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #4a4840;
  }

  .wordmark {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #4a4840;
    font-style: normal;
    font-family: 'Instrument Serif', Georgia, serif;
    white-space: nowrap;
  }
</style>
</head>
<body>

  <p class="runes" aria-hidden="true">ᛗ ᚨ ᚾ ᚾ ᛖ ᚹ ᛁ ᛏ</p>

  <blockquote>
    <p class="stanza">
      "A better burden no man bears on the road than much wisdom."
    </p>
    <p class="original">Betre boer du berkje í bakken enn mannevit mykje</p>
    <footer class="attribution">Hávamál — The Sayings of Odin, Stanza 10</footer>
  </blockquote>

  <p class="wordmark">Mannevit · mannevit.ai</p>

</body>
</html>
